name: CISA KEV Vulnerability Check

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: read
  vulnerability-alerts: read

jobs:
  kev-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download CISA KEV catalog
        run: |
          echo "📥 Downloading CISA KEV Catalog..."
          curl -sS https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json \
            -o /tmp/kev.json
          TOTAL=$(jq '.vulnerabilities | length' /tmp/kev.json)
          echo "✅ KEV catalog downloaded. Total entries: $TOTAL"

      - name: Extract KEV CVE IDs
        run: |
          jq -r '.vulnerabilities[].cveID' /tmp/kev.json | sort -u > /tmp/kev_cves.txt
          echo "📋 Total KEV CVEs: $(wc -l < /tmp/kev_cves.txt)"

      - name: Fetch open Dependabot alerts
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_PAT }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "🔍 Fetching open Dependabot alerts for $OWNER/$REPO..."
          echo ""

          echo "🔄 Method 1: REST API..."
          gh api "/repos/$OWNER/$REPO/dependabot/alerts?state=open" \
            --paginate \
            --jq '.[].security_advisory.cve_id // empty' 2>/dev/null | sort -u > /tmp/rest_cves.txt || true
          sed -i '/^$/d' /tmp/rest_cves.txt
          REST_COUNT=$(wc -l < /tmp/rest_cves.txt)
          echo "   REST API returned: $REST_COUNT CVEs"

          if [ "$REST_COUNT" -gt 0 ]; then
            echo "   ✅ Using REST API results"
            cp /tmp/rest_cves.txt /tmp/dependabot_cves.txt
          else
            echo "   ⚠️  REST API returned 0 results, trying GraphQL..."
            echo ""
            echo "🔄 Method 2: GraphQL API..."
            gh api graphql -f query='query($owner: String!, $repo: String!) { repository(owner: $owner, name: $repo) { vulnerabilityAlerts(first: 100, states: OPEN) { nodes { securityAdvisory { identifiers { type value } summary } securityVulnerability { package { name ecosystem } } } } } }' -f owner="$OWNER" -f repo="$REPO" > /tmp/graphql_response.json 2>/dev/null || true

            jq -r '.data.repository.vulnerabilityAlerts.nodes[].securityAdvisory.identifiers[] | select(.type == "CVE") | .value' /tmp/graphql_response.json 2>/dev/null | sort -u > /tmp/graphql_cves.txt || true
            sed -i '/^$/d' /tmp/graphql_cves.txt
            GRAPHQL_COUNT=$(wc -l < /tmp/graphql_cves.txt)
            echo "   GraphQL API returned: $GRAPHQL_COUNT CVEs"

            if [ "$GRAPHQL_COUNT" -gt 0 ]; then
              echo "   ✅ Using GraphQL API results"
              cp /tmp/graphql_cves.txt /tmp/dependabot_cves.txt
            else
              echo "   ❌ Both methods returned 0 results"
              touch /tmp/dependabot_cves.txt
            fi
          fi

          echo ""
          ALERT_COUNT=$(wc -l < /tmp/dependabot_cves.txt)
          echo "📋 Total unique Dependabot CVEs found: $ALERT_COUNT"
          if [ "$ALERT_COUNT" -eq 0 ]; then
            echo "NO_ALERTS=true" >> "$GITHUB_ENV"
          else
            echo "--- Open CVEs ---"
            cat /tmp/dependabot_cves.txt
          fi

      - name: Check for Dependabot alerts
        if: env.NO_ALERTS == 'true'
        run: |
          echo "✅ No open Dependabot alerts found. Nothing to cross-reference with CISA KEV."

      - name: Cross-reference with CISA KEV
        if: env.NO_ALERTS != 'true'
        run: |
          comm -12 /tmp/kev_cves.txt /tmp/dependabot_cves.txt > /tmp/matched_cves.txt
          TOTAL_DEP=$(wc -l < /tmp/dependabot_cves.txt)
          MATCHED=$(wc -l < /tmp/matched_cves.txt)
          NOT_MATCHED=$((TOTAL_DEP - MATCHED))
          echo "TOTAL_DEP=$TOTAL_DEP" >> "$GITHUB_ENV"
          echo "MATCHED=$MATCHED" >> "$GITHUB_ENV"
          echo "NOT_MATCHED=$NOT_MATCHED" >> "$GITHUB_ENV"

      - name: Generate CISA KEV report
        if: env.NO_ALERTS != 'true'
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M %Z')
          echo "========================================="
          echo "  CISA KEV Cross-Reference Report"
          echo "  Repository: ${{ github.repository }}"
          echo "  Date: $DATE"
          echo "========================================="
          echo ""
          echo "📊 Results Summary:"
          echo "   Total open Dependabot CVEs : $TOTAL_DEP"
          echo "   In CISA KEV (exploited)    : $MATCHED"
          echo "   Not in CISA KEV            : $NOT_MATCHED"
          echo ""
          if [ "$MATCHED" -gt 0 ]; then
            echo "🚨 CRITICAL: The following CVEs are ACTIVELY EXPLOITED (in CISA KEV):"
            echo "-------------------------------------------"
            while IFS= read -r CVE; do
              INFO=$(jq -r --arg cve "$CVE" \
                '.vulnerabilities[] | select(.cveID == $cve) | "\(.vulnerabilityName)\t\(.vendorProject)\t\(.product)\t\(.dueDate)"' \
                /tmp/kev.json | head -1)
              NAME=$(echo "$INFO" | cut -f1)
              VENDOR=$(echo "$INFO" | cut -f2)
              PRODUCT=$(echo "$INFO" | cut -f3)
              DUE=$(echo "$INFO" | cut -f4)
              echo ""
              echo "  ⚠️  $CVE"
              echo "      Name    : $NAME"
              echo "      Vendor  : $VENDOR"
              echo "      Product : $PRODUCT"
              echo "      Due Date: $DUE"
            done < /tmp/matched_cves.txt
            echo ""
            echo "-------------------------------------------"
            echo "🔴 ACTION REQUIRED: Remediate these vulnerabilities immediately!"
            exit 1
          else
            echo "✅ No open Dependabot CVEs found in CISA KEV catalog."
            echo "   None of your open alerts are currently actively exploited per CISA KEV."
          fi

      - name: List non-KEV alerts for reference
        if: always()
        run: |
          if [ ! -f /tmp/dependabot_cves.txt ] || [ ! -f /tmp/matched_cves.txt ]; then
            echo "ℹ️  No Dependabot CVE data available to list."
            exit 0
          fi
          comm -23 /tmp/dependabot_cves.txt /tmp/kev_cves.txt > /tmp/non_kev_cves.txt
          NON_KEV=$(wc -l < /tmp/non_kev_cves.txt)
          if [ "$NON_KEV" -gt 0 ]; then
            echo ""
            echo "ℹ️  Non-KEV open Dependabot CVEs (still should be reviewed):"
            echo "-------------------------------------------"
            while IFS= read -r CVE; do
              echo "   • $CVE"
            done < /tmp/non_kev_cves.txt
            echo "-------------------------------------------"
            echo "   Total: $NON_KEV CVE(s)"
          else
            echo "ℹ️  No non-KEV alerts to list."
          fi
