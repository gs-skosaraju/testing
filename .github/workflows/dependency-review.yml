name: 'Dependency Review'

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Dependency Review'
        id: review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          license-check: true
          vulnerability-check: true
          warn-only: true

      - name: 'Post Risk Acceptance Template'
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const templateExists = comments.some(c =>
              c.body.includes('## 🛡️ Security Risk Acceptance Required')
            );

            if (!templateExists) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## 🛡️ Security Risk Acceptance Required

            This PR contains **vulnerable dependencies** detected by Dependency Review.

            A security reviewer must review and approve this PR before it can be merged.

            ### Reviewer: Please copy and fill out this template as a comment before approving:

            \`\`\`
            ### Risk Acceptance

            - **Reviewer:** @your-username
            - **Date:** YYYY-MM-DD
            - **Risk Level:** [Critical / High]
            - **Affected Dependencies:**
              - [ ] List affected packages
            - **Justification:** Why is this risk acceptable?
            - **Mitigation Plan:** What steps will be taken to remediate?
            - **Target Remediation Date:** YYYY-MM-DD
            - **Approval:** ✅ I accept the security risk for this PR.
            \`\`\`

            > ⚠️ **After posting the filled-out template, approve the PR review.**`
              });
            }

      - name: 'Verify Risk Acceptance Comment'
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const acceptanceComment = comments.find(c =>
              c.body.includes('### Risk Acceptance') &&
              c.body.includes('Approval:') &&
              c.body.includes('✅') &&
              c.body.includes('Justification:') &&
              !c.body.includes('Please copy and fill out')
            );

            if (!acceptanceComment) {
              core.setFailed(
                '❌ No valid Risk Acceptance comment found!\n\n' +
                'A reviewer must post a filled-out Risk Acceptance template ' +
                'as a PR comment BEFORE this check can pass.\n\n' +
                'Please check the PR comments for the template.'
              );
            } else {
              core.info('✅ Risk Acceptance comment found!');
              core.info(`Accepted by: ${acceptanceComment.user.login}`);
            }
